[build]
builder = "NIXPACKS"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
name = "postgres"

[services.variables]
POSTGRES_USER = "postgres"
POSTGRES_PASSWORD = "password"
POSTGRES_DB = "monorepo"

[[services]]
name = "redis"

[services.variables]
REDIS_PASSWORD = ""

[[services]]
name = "api"
